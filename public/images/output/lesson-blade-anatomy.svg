<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <rect width="1200" height="400" fill="#0d1117"/>

  <text x="600" y="30" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="bold">Blade Anatomy</text>

  <!-- Chef knife - traditional shape, horizontal, blade pointing right -->
  <!-- Handle -->
  <path d="M 100,210 Q 100,190 120,188 L 250,185 Q 260,185 262,190 L 262,230 Q 260,235 250,235 L 120,232 Q 100,230 100,210 Z"
        fill="#3d2b1f" stroke="#6b5744" stroke-width="1.5"/>
  <!-- Handle rivets -->
  <circle cx="150" cy="210" r="5" fill="#9ca3af" stroke="#6b7280" stroke-width="1"/>
  <circle cx="200" cy="210" r="5" fill="#9ca3af" stroke="#6b7280" stroke-width="1"/>

  <!-- Bolster -->
  <rect x="255" y="180" width="18" height="60" rx="3" fill="#6b7280" stroke="#9ca3af" stroke-width="1"/>

  <!-- Blade -->
  <path d="M 273,185 L 900,175 Q 960,175 1000,195 L 1020,210 Q 960,230 900,240 L 500,248 L 350,250 L 273,240 Z"
        fill="#c0c8d4" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Bevel line -->
  <path d="M 310,242 Q 500,237 700,232 Q 850,226 950,215"
        fill="none" stroke="#6b7280" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- SPINE -->
  <line x1="600" y1="175" x2="600" y2="130" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="600" cy="175" r="3" fill="#3b82f6"/>
  <text x="600" y="122" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="15" font-weight="600">SPINE</text>

  <!-- TIP -->
  <line x1="1020" y1="210" x2="1070" y2="160" stroke="#10b981" stroke-width="1"/>
  <circle cx="1020" cy="210" r="3" fill="#10b981"/>
  <text x="1075" y="155" fill="#10b981" font-family="system-ui, sans-serif" font-size="15" font-weight="600">TIP</text>

  <!-- EDGE -->
  <line x1="650" y1="242" x2="650" y2="290" stroke="#10b981" stroke-width="1"/>
  <circle cx="650" cy="242" r="3" fill="#10b981"/>
  <text x="650" y="308" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="15" font-weight="600">EDGE</text>

  <!-- BELLY -->
  <line x1="850" y1="236" x2="900" y2="290" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="850" cy="236" r="3" fill="#f59e0b"/>
  <text x="905" y="298" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="15" font-weight="600">BELLY</text>

  <!-- HEEL -->
  <line x1="310" y1="248" x2="310" y2="310" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="310" cy="248" r="3" fill="#f59e0b"/>
  <text x="310" y="328" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="15" font-weight="600">HEEL</text>

  <!-- CHOIL -->
  <line x1="278" y1="240" x2="240" y2="300" stroke="#ef4444" stroke-width="1"/>
  <circle cx="278" cy="240" r="3" fill="#ef4444"/>
  <text x="215" y="318" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="15" font-weight="600">CHOIL</text>

  <!-- PLUNGE LINE -->
  <line x1="350" y1="185" x2="350" y2="130" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="350" cy="185" r="3" fill="#3b82f6"/>
  <text x="350" y="122" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="13">PLUNGE LINE</text>

  <!-- BEVEL -->
  <line x1="750" y1="232" x2="800" y2="280" stroke="#9ca3af" stroke-width="1"/>
  <circle cx="750" cy="232" r="3" fill="#9ca3af"/>
  <text x="805" y="288" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="13">BEVEL</text>

  <!-- HANDLE -->
  <line x1="160" y1="190" x2="160" y2="150" stroke="#6b5744" stroke-width="1"/>
  <text x="160" y="142" text-anchor="middle" fill="#a87c5a" font-family="system-ui, sans-serif" font-size="13">HANDLE</text>

  <!-- BOLSTER -->
  <line x1="264" y1="180" x2="264" y2="145" stroke="#9ca3af" stroke-width="1"/>
  <text x="264" y="137" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="13">BOLSTER</text>

  <!-- Bevel detail inset -->
  <rect x="50" y="340" width="280" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="360" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Bevel Detail</text>
  <line x1="170" y1="390" x2="220" y2="355" stroke="#10b981" stroke-width="1.5"/>
  <line x1="270" y1="390" x2="220" y2="355" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="220" cy="355" r="2" fill="#ef4444"/>
  <text x="222" y="350" fill="#ef4444" font-family="system-ui, sans-serif" font-size="10">apex</text>
  <text x="175" y="388" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">bevel</text>
  <text x="250" y="388" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">bevel</text>
</svg>
