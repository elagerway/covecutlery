  <text x="440" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">420HC</text>
  <text x="590" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">120 &gt; 600 &gt; strop</text>
  <text x="770" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">10/side @120, 5/side @600</text>
  <text x="990" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">Overground @120</text>

