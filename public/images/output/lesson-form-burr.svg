<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Form the Burr — 120 Grit</text>
  <text x="600" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Cubitron II 120 belt · Edge-leading · Light pressure</text>

  <!-- Step 1: MARK -->
  <rect x="60" y="100" width="230" height="200" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="8"/>
  <circle cx="85" cy="125" r="16" fill="#10b981" opacity="0.2"/>
  <text x="85" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">1</text>
  <text x="175" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">MARK</text>
  <line x1="80" y1="145" x2="270" y2="145" stroke="#6b7280" stroke-width="1" opacity="0.3"/>
  <text x="175" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Sharpie marker on</text>
  <text x="175" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">the entire bevel</text>
  <text x="175" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Shows exactly where</text>
  <text x="175" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">steel is being removed</text>

  <!-- Arrow 1-2 -->
  <line x1="295" y1="200" x2="330" y2="200" stroke="#6b7280" stroke-width="2"/>
  <polygon points="330,195 340,200 330,205" fill="#6b7280"/>

  <!-- Step 2: GRIND -->
  <rect x="345" y="100" width="230" height="200" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <circle cx="370" cy="125" r="16" fill="#3b82f6" opacity="0.2"/>
  <text x="370" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6" text-anchor="middle">2</text>
  <text x="460" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle">GRIND</text>
  <line x1="365" y1="145" x2="555" y2="145" stroke="#6b7280" stroke-width="1" opacity="0.3"/>
  <text x="460" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Edge-leading passes</text>
  <text x="460" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">1-2 seconds each</text>
  <text x="460" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Sweep heel to tip</text>
  <text x="460" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Light pressure only</text>

  <!-- Arrow 2-3 -->
  <line x1="580" y1="200" x2="615" y2="200" stroke="#6b7280" stroke-width="2"/>
  <polygon points="615,195 625,200 615,205" fill="#6b7280"/>

  <!-- Step 3: CHECK -->
  <rect x="630" y="100" width="230" height="200" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <circle cx="655" cy="125" r="16" fill="#f59e0b" opacity="0.2"/>
  <text x="655" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">3</text>
  <text x="745" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#f59e0b" text-anchor="middle">CHECK</text>
  <line x1="650" y1="145" x2="840" y2="145" stroke="#6b7280" stroke-width="1" opacity="0.3"/>
  <text x="745" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Feel for burr with</text>
  <text x="745" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">your fingernail</text>
  <text x="745" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Drag across edge,</text>
  <text x="745" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">not along it</text>

  <!-- Arrow 3-4 -->
  <line x1="865" y1="200" x2="900" y2="200" stroke="#6b7280" stroke-width="2"/>
  <polygon points="900,195 910,200 900,205" fill="#6b7280"/>

  <!-- Step 4: STOP -->
  <rect x="915" y="100" width="230" height="200" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
  <circle cx="940" cy="125" r="16" fill="#ef4444" opacity="0.2"/>
  <text x="940" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">4</text>
  <text x="1030" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">STOP</text>
  <line x1="935" y1="145" x2="1125" y2="145" stroke="#6b7280" stroke-width="1" opacity="0.3"/>
  <text x="1030" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Burr = you're done</text>
  <text x="1030" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">on this side</text>
  <text x="1030" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Flip and repeat</text>
  <text x="1030" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">on the other side</text>

  <!-- Bottom warning note -->
  <rect x="250" y="330" width="700" height="45" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
  <rect x="250" y="330" width="6" height="45" fill="#f59e0b" rx="3"/>
  <text x="600" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">More is NOT better. Once you have a burr, stop.</text>
</svg>