<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Heat Management</text>
  <text x="600" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Heat is the enemy — it ruins temper permanently</text>

  <!-- Left column: Warning Signs -->
  <rect x="80" y="90" width="6" height="280" fill="#f59e0b" rx="3"/>
  <text x="110" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#f59e0b">WARNING SIGNS</text>

  <circle cx="125" cy="155" r="6" fill="#f59e0b" opacity="0.3"/>
  <circle cx="125" cy="155" r="3" fill="#f59e0b"/>
  <text x="145" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Hot to touch</text>
  <text x="145" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">If you can't hold it, you've gone too far</text>

  <circle cx="125" cy="215" r="6" fill="#f59e0b" opacity="0.3"/>
  <circle cx="125" cy="215" r="3" fill="#f59e0b"/>
  <text x="145" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Blue/purple discoloration</text>
  <text x="145" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Temper is already lost — damage is done</text>

  <circle cx="125" cy="275" r="6" fill="#f59e0b" opacity="0.3"/>
  <circle cx="125" cy="275" r="3" fill="#f59e0b"/>
  <text x="145" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Smoke</text>
  <text x="145" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Steel or belt overheating</text>

  <circle cx="125" cy="335" r="6" fill="#f59e0b" opacity="0.3"/>
  <circle cx="125" cy="335" r="3" fill="#f59e0b"/>
  <text x="145" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Burning smell</text>
  <text x="145" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Stop immediately</text>

  <!-- Right column: Prevention -->
  <rect x="620" y="90" width="6" height="280" fill="#10b981" rx="3"/>
  <text x="650" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#10b981">PREVENTION</text>

  <circle cx="665" cy="155" r="6" fill="#10b981" opacity="0.3"/>
  <circle cx="665" cy="155" r="3" fill="#10b981"/>
  <text x="685" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Light pressure</text>
  <text x="685" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Let the belt do the work, not your hands</text>

  <circle cx="665" cy="215" r="6" fill="#10b981" opacity="0.3"/>
  <circle cx="665" cy="215" r="3" fill="#10b981"/>
  <text x="685" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">1-2 second passes</text>
  <text x="685" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Short contact time prevents heat buildup</text>

  <circle cx="665" cy="275" r="6" fill="#10b981" opacity="0.3"/>
  <circle cx="665" cy="275" r="3" fill="#10b981"/>
  <text x="685" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Dunk in water</text>
  <text x="685" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Keep a cup of water nearby, dip often</text>

  <circle cx="665" cy="335" r="6" fill="#10b981" opacity="0.3"/>
  <circle cx="665" cy="335" r="3" fill="#10b981"/>
  <text x="685" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Watch for color changes</text>
  <text x="685" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Straw → gold → blue = increasing damage</text>
</svg>