<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Hollow Grind</text>

  <!-- Cross-section with concave sides -->
  <path d="M 170,100 Q 230,220 240,350" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <path d="M 310,100 Q 250,220 240,350" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <line x1="170" y1="100" x2="310" y2="100" stroke="#3b82f6" stroke-width="2"/>

  <!-- Apex -->
  <circle cx="240" cy="350" r="4" fill="#3b82f6"/>
  <text x="240" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle">APEX</text>

  <!-- Concave labels -->
  <text x="130" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="end">Concave</text>
  <text x="130" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="end">scoop</text>

  <!-- Contact wheel diagram -->
  <rect x="380" y="100" width="200" height="180" fill="#1e293b" stroke="#6b7280" stroke-width="1" rx="8"/>
  <text x="480" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Contact Wheel</text>

  <!-- Wheel circle -->
  <circle cx="480" cy="210" r="50" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <circle cx="480" cy="210" r="4" fill="#3b82f6"/>

  <!-- Diameter label -->
  <line x1="430" y1="210" x2="530" y2="210" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3"/>
  <text x="480" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">6-8" diameter</text>

  <!-- Notes about size -->
  <text x="480" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Smaller wheel = deeper hollow</text>
  <text x="480" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Larger wheel = shallower hollow</text>

  <!-- Right side: Notes -->
  <rect x="620" y="80" width="6" height="210" fill="#10b981" rx="3"/>
  <text x="650" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#10b981">TECHNIQUE</text>

  <text x="650" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Grind on the contact wheel (not platen)</text>
  <text x="650" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Wheel curves the grind concavely</text>
  <text x="650" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Very sharp but thin behind the edge</text>
  <text x="650" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Common on razors and fillet knives</text>
  <text x="650" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Easy to touch up on flat stones</text>

  <!-- Fragility warning -->
  <rect x="620" y="300" width="530" height="70" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
  <rect x="620" y="300" width="6" height="70" fill="#f59e0b" rx="3"/>
  <text x="645" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">FRAGILITY NOTE</text>
  <text x="645" y="353" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">Hollow grinds are fragile. Not for batoning, prying, or hard use. The thin edge chips easily.</text>
</svg>