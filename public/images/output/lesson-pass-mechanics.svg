<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Pass Mechanics</text>

  <!-- Left: Rules list with green accent bar -->
  <rect x="60" y="70" width="6" height="290" fill="#10b981" rx="3"/>
  <text x="90" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#10b981">RULES</text>

  <circle cx="105" cy="132" r="6" fill="#10b981" opacity="0.3"/>
  <text x="107" y="137" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">1</text>
  <text x="125" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">1-2 seconds per pass</text>
  <text x="125" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Any longer builds heat</text>

  <circle cx="105" cy="178" r="6" fill="#10b981" opacity="0.3"/>
  <text x="107" y="183" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">2</text>
  <text x="125" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Light pressure</text>
  <text x="125" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Let the belt do the cutting</text>

  <circle cx="105" cy="224" r="6" fill="#10b981" opacity="0.3"/>
  <text x="107" y="229" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">3</text>
  <text x="125" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Consistent speed</text>
  <text x="125" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Don't speed up or slow down mid-pass</text>

  <circle cx="105" cy="270" r="6" fill="#10b981" opacity="0.3"/>
  <text x="107" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">4</text>
  <text x="125" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Lock wrists</text>
  <text x="125" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Angle changes = uneven bevel</text>

  <circle cx="105" cy="316" r="6" fill="#10b981" opacity="0.3"/>
  <text x="107" y="321" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">5</text>
  <text x="125" y="314" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Full edge contact</text>
  <text x="125" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Entire bevel touches the belt</text>

  <circle cx="105" cy="358" r="6" fill="#10b981" opacity="0.3"/>
  <text x="107" y="363" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">6</text>
  <text x="125" y="356" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ffffff">Edge-leading (for grinding)</text>
  <text x="125" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Edge goes into the belt first</text>

  <!-- Right: Sweep direction diagram -->
  <rect x="520" y="80" width="620" height="290" fill="#1e293b" stroke="#6b7280" stroke-width="1" rx="8"/>
  <text x="830" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Sweep Direction: Heel to Tip</text>

  <!-- Simplified knife shape showing sweep -->
  <path d="M 580,220 L 610,200 L 950,190 L 1050,185 L 1080,200 L 1050,215 Q 900,260 750,265 L 620,260 L 580,220 Z" fill="none" stroke="#6b7280" stroke-width="2"/>

  <!-- HEEL label -->
  <text x="580" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">HEEL</text>
  <text x="580" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Start here</text>

  <!-- TIP label -->
  <text x="1080" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">TIP</text>
  <text x="1080" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">End here</text>

  <!-- Sweep arrow -->
  <path d="M 620,250 Q 800,290 1040,210" fill="none" stroke="#10b981" stroke-width="3"/>
  <polygon points="1035,204 1050,208 1038,216" fill="#10b981"/>

  <!-- Direction label -->
  <text x="830" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">SWEEP DIRECTION</text>

  <!-- Belt direction note -->
  <text x="830" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Belt runs vertically — you sweep the blade horizontally across it</text>
</svg>