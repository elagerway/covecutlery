<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Scandi Grind</text>

  <!-- Cross-section -->
  <!-- Flat sides -->
  <line x1="200" y1="100" x2="200" y2="220" stroke="#f59e0b" stroke-width="3"/>
  <line x1="340" y1="100" x2="340" y2="220" stroke="#f59e0b" stroke-width="3"/>
  <!-- Spine -->
  <line x1="200" y1="100" x2="340" y2="100" stroke="#f59e0b" stroke-width="2"/>

  <!-- Wide bevel to edge -->
  <line x1="200" y1="220" x2="270" y2="340" stroke="#f59e0b" stroke-width="3"/>
  <line x1="340" y1="220" x2="270" y2="340" stroke="#f59e0b" stroke-width="3"/>

  <!-- Shoulder line -->
  <line x1="180" y1="220" x2="360" y2="220" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
  <text x="375" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">SHOULDER</text>

  <!-- Apex -->
  <circle cx="270" cy="340" r="4" fill="#f59e0b"/>
  <text x="270" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">APEX (no microbevel)</text>

  <!-- Labels -->
  <text x="160" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="end">Flat</text>
  <text x="160" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="end">sides</text>
  <text x="380" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Wide single</text>
  <text x="380" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">bevel</text>

  <!-- Right side: Technique list -->
  <rect x="540" y="80" width="6" height="290" fill="#10b981" rx="3"/>
  <text x="570" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#10b981">TECHNIQUE</text>

  <text x="570" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Lay bevel flat on platen/belt</text>
  <text x="570" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; No angle guessing — bevel IS the guide</text>
  <text x="570" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Use Sharpie to confirm full contact</text>
  <text x="570" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Light pressure, edge-leading</text>
  <text x="570" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Keep passes short: 1-2 seconds</text>
  <text x="570" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Do NOT round the shoulder</text>
  <text x="570" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; No microbevel — just the primary bevel</text>
  <text x="570" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Common on Mora, Puukko, bushcraft knives</text>

  <!-- Bottom note -->
  <text x="600" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Scandi grinds are the easiest to sharpen — the bevel registers itself on the belt</text>
</svg>