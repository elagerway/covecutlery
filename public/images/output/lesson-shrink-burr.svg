<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Shrink the Burr — 600 Grit</text>

  <!-- Stage 1: 120 GRIT (large burr) -->
  <text x="200" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">120 GRIT</text>
  <text x="200" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">After forming</text>

  <!-- Blade cross-section -->
  <line x1="130" y1="320" x2="200" y2="160" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="270" y1="320" x2="200" y2="160" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="130" y1="320" x2="270" y2="320" stroke="#6b7280" stroke-width="1" stroke-dasharray="3"/>

  <!-- Large burr circle -->
  <circle cx="200" cy="153" r="18" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <path d="M 200,160 Q 195,140 205,135 Q 218,128 220,145" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <text x="200" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">LARGE</text>

  <!-- Arrow 1-2 -->
  <line x1="310" y1="240" x2="380" y2="240" stroke="#6b7280" stroke-width="2"/>
  <polygon points="380,235 395,240 380,245" fill="#6b7280"/>
  <text x="345" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">600</text>
  <text x="345" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">grit</text>

  <!-- Stage 2: 600 START (medium burr) -->
  <text x="500" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#f59e0b" text-anchor="middle">600 START</text>
  <text x="500" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Beginning passes</text>

  <!-- Blade cross-section -->
  <line x1="430" y1="320" x2="500" y2="160" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="570" y1="320" x2="500" y2="160" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="430" y1="320" x2="570" y2="320" stroke="#6b7280" stroke-width="1" stroke-dasharray="3"/>

  <!-- Medium burr circle -->
  <circle cx="500" cy="155" r="11" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <path d="M 500,160 Q 497,148 503,145 Q 511,140 512,150" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">MEDIUM</text>

  <!-- Arrow 2-3 -->
  <line x1="610" y1="240" x2="680" y2="240" stroke="#6b7280" stroke-width="2"/>
  <polygon points="680,235 695,240 680,245" fill="#6b7280"/>
  <text x="645" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">more</text>
  <text x="645" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">passes</text>

  <!-- Stage 3: 600 END (tiny burr) -->
  <text x="800" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">600 END</text>
  <text x="800" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Barely perceptible</text>

  <!-- Blade cross-section -->
  <line x1="730" y1="320" x2="800" y2="160" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="870" y1="320" x2="800" y2="160" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="730" y1="320" x2="870" y2="320" stroke="#6b7280" stroke-width="1" stroke-dasharray="3"/>

  <!-- Tiny burr -->
  <circle cx="800" cy="157" r="5" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <text x="800" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">TINY</text>

  <!-- Notes on right -->
  <rect x="940" y="95" width="220" height="260" fill="#1e293b" stroke="#6b7280" stroke-width="1" rx="6"/>
  <text x="1050" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Goal</text>
  <line x1="960" y1="132" x2="1140" y2="132" stroke="#6b7280" stroke-width="1" opacity="0.3"/>
  <text x="970" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">Reduce the burr</text>
  <text x="970" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">until it's barely</text>
  <text x="970" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">detectable by nail</text>
  <text x="970" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#10b981">Light pressure</text>
  <text x="970" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#10b981">Alternate sides</text>
  <text x="970" y="281" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#10b981">1-2 passes per side</text>
  <text x="970" y="314" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f59e0b">Don't remove the</text>
  <text x="970" y="334" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f59e0b">burr entirely yet</text>

  <!-- Bottom note -->
  <text x="600" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">The strop belt and strop wheel will handle final burr removal</text>
</svg>