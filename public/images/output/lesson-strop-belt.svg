<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Strop Belt</text>
  <text x="600" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">3000 grit leather belt — edge-trailing only</text>

  <!-- Left: Technique rules -->
  <rect x="60" y="90" width="6" height="260" fill="#10b981" rx="3"/>
  <text x="90" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#10b981">TECHNIQUE</text>

  <text x="90" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Edge-trailing direction ONLY</text>
  <text x="90" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Feather-light pressure</text>
  <text x="90" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Maintain same angle as grinding</text>
  <text x="90" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; 3-5 alternating passes per side</text>
  <text x="90" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Sweep full edge heel to tip</text>
  <text x="90" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; No compound needed (leather works alone)</text>
  <text x="90" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">&#x2022; Listen for soft hiss</text>

  <!-- Center: Belt with direction arrow -->
  <rect x="520" y="110" width="200" height="220" fill="#1e293b" stroke="#6b7280" stroke-width="2" rx="8"/>
  <text x="620" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6b7280" text-anchor="middle">BELT DIRECTION</text>

  <!-- Belt moving up arrow -->
  <line x1="620" y1="290" x2="620" y2="170" stroke="#10b981" stroke-width="3"/>
  <polygon points="610,175 620,155 630,175" fill="#10b981"/>
  <text x="660" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#10b981" transform="rotate(-90,660,230)">BELT MOVES UP</text>

  <!-- Knife angle (edge trailing) -->
  <line x1="570" y1="260" x2="640" y2="200" stroke="#ffffff" stroke-width="2.5"/>
  <text x="555" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">spine</text>
  <circle cx="640" cy="200" r="3" fill="#f59e0b"/>
  <text x="665" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f59e0b">edge</text>

  <!-- EDGE-TRAILING label -->
  <text x="620" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">EDGE-TRAILING</text>

  <!-- Warning box -->
  <rect x="770" y="90" width="380" height="80" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
  <rect x="770" y="90" width="6" height="80" fill="#ef4444" rx="3"/>
  <text x="795" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ef4444">WARNING</text>
  <text x="795" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">Edge-leading on strop = cuts leather</text>
  <text x="795" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">Ruins belt and dulls edge instantly</text>

  <!-- Purpose box -->
  <rect x="770" y="195" width="380" height="155" fill="#1e293b" stroke="#6b7280" stroke-width="1" rx="8"/>
  <text x="960" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">What Stropping Does</text>
  <line x1="790" y1="232" x2="1130" y2="232" stroke="#6b7280" stroke-width="1" opacity="0.3"/>
  <text x="800" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">&#x2022; Removes remaining burr</text>
  <text x="800" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">&#x2022; Polishes the bevel face</text>
  <text x="800" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">&#x2022; Aligns the edge apex</text>
  <text x="800" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">&#x2022; Refines scratch pattern</text>
</svg>