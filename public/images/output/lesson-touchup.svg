<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Touch-Up Routine</text>

  <!-- Step 1: 600 GRIT -->
  <rect x="80" y="80" width="300" height="200" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <circle cx="110" cy="110" r="18" fill="#3b82f6" opacity="0.2"/>
  <text x="110" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle">1</text>
  <text x="230" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle">600 GRIT</text>
  <line x1="100" y1="130" x2="360" y2="130" stroke="#6b7280" stroke-width="1" opacity="0.3"/>

  <text x="230" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">3-5 passes per side</text>
  <text x="230" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Edge-leading</text>
  <text x="230" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Light pressure</text>
  <text x="230" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Only if edge is visibly dull</text>
  <text x="230" y="253" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">or has micro-chips</text>

  <!-- Arrow 1-2 -->
  <line x1="385" y1="180" x2="430" y2="180" stroke="#6b7280" stroke-width="2.5"/>
  <polygon points="430,175 445,180 430,185" fill="#6b7280"/>

  <!-- Step 2: STROP BELT -->
  <rect x="450" y="80" width="300" height="200" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="8"/>
  <circle cx="480" cy="110" r="18" fill="#10b981" opacity="0.2"/>
  <text x="480" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#10b981" text-anchor="middle">2</text>
  <text x="600" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">STROP BELT</text>
  <line x1="470" y1="130" x2="730" y2="130" stroke="#6b7280" stroke-width="1" opacity="0.3"/>

  <text x="600" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">3-5 alternating passes</text>
  <text x="600" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Edge-trailing only</text>
  <text x="600" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Feather-light</text>
  <text x="600" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Removes micro-burr</text>
  <text x="600" y="253" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">and refines edge</text>

  <!-- Arrow 2-3 -->
  <line x1="755" y1="180" x2="800" y2="180" stroke="#6b7280" stroke-width="2.5"/>
  <polygon points="800,175 815,180 800,185" fill="#6b7280"/>

  <!-- Step 3: STROP WHEEL -->
  <rect x="820" y="80" width="300" height="200" fill="#1e293b" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <circle cx="850" cy="110" r="18" fill="#f59e0b" opacity="0.2"/>
  <text x="850" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#f59e0b" text-anchor="middle">3</text>
  <text x="970" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#f59e0b" text-anchor="middle">STROP WHEEL</text>
  <line x1="840" y1="130" x2="1100" y2="130" stroke="#6b7280" stroke-width="1" opacity="0.3"/>

  <text x="970" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">2-3 passes per side</text>
  <text x="970" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Edge-trailing only</text>
  <text x="970" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Minimum pressure</text>
  <text x="970" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Final polish and</text>
  <text x="970" y="253" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">edge alignment</text>

  <!-- Bottom: Frequency guide -->
  <text x="600" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Frequency Guide</text>
  <line x1="200" y1="328" x2="1000" y2="328" stroke="#6b7280" stroke-width="1" opacity="0.3"/>

  <text x="230" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#10b981" font-weight="bold">Daily use:</text>
  <text x="320" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">Strop wheel only</text>

  <text x="530" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#f59e0b" font-weight="bold">Weekly:</text>
  <text x="600" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">Strop belt + wheel</text>

  <text x="790" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ef4444" font-weight="bold">Monthly:</text>
  <text x="870" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff">Full 3-step routine</text>
</svg>