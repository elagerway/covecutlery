<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">Tracking &amp; Tension</text>

  <!-- Left section: Belt diagrams -->
  <text x="250" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Belt Tracking</text>

  <!-- Centered belt (good) -->
  <text x="150" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">Centered</text>
  <!-- Wheel outline -->
  <rect x="80" y="125" width="140" height="180" fill="none" stroke="#6b7280" stroke-width="2" rx="4"/>
  <!-- Belt strip centered -->
  <rect x="110" y="130" width="80" height="170" fill="none" stroke="#10b981" stroke-width="3" rx="2"/>
  <!-- Center line -->
  <line x1="150" y1="125" x2="150" y2="305" stroke="#10b981" stroke-width="1" stroke-dasharray="4"/>
  <!-- Checkmark -->
  <text x="150" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#10b981" text-anchor="middle">&#x2713;</text>

  <!-- Off-center belt (bad) -->
  <text x="350" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">Off-Center</text>
  <!-- Wheel outline -->
  <rect x="280" y="125" width="140" height="180" fill="none" stroke="#6b7280" stroke-width="2" rx="4"/>
  <!-- Belt strip shifted right -->
  <rect x="330" y="130" width="80" height="170" fill="none" stroke="#ef4444" stroke-width="3" rx="2"/>
  <!-- Center line -->
  <line x1="350" y1="125" x2="350" y2="305" stroke="#ef4444" stroke-width="1" stroke-dasharray="4"/>
  <!-- X mark -->
  <text x="350" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ef4444" text-anchor="middle">&#x2717;</text>

  <!-- Right section: Tension guide -->
  <text x="820" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Tension Guide</text>

  <!-- Too loose -->
  <rect x="620" y="100" width="400" height="70" fill="none" stroke="#ef4444" stroke-width="2" rx="6" opacity="0.3"/>
  <rect x="620" y="100" width="6" height="70" fill="#ef4444" rx="3"/>
  <text x="645" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ef4444">TOO LOOSE</text>
  <text x="645" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff">Belt slips on wheel, inconsistent contact, poor cutting</text>

  <!-- Just right -->
  <rect x="620" y="185" width="400" height="70" fill="none" stroke="#10b981" stroke-width="2" rx="6" opacity="0.3"/>
  <rect x="620" y="185" width="6" height="70" fill="#10b981" rx="3"/>
  <text x="645" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#10b981">JUST RIGHT</text>
  <text x="645" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff">Snug with slight give, belt tracks true, even contact</text>

  <!-- Too tight -->
  <rect x="620" y="270" width="400" height="70" fill="none" stroke="#ef4444" stroke-width="2" rx="6" opacity="0.3"/>
  <rect x="620" y="270" width="6" height="70" fill="#ef4444" rx="3"/>
  <text x="645" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ef4444">TOO TIGHT</text>
  <text x="645" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff">Excess heat, premature wear, bearing strain, belt stretching</text>

  <!-- Bottom tip -->
  <text x="600" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Adjust the tracking knob while the belt runs until it centers on the platen</text>
</svg>