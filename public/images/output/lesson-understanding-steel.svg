<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <rect width="1200" height="400" fill="#0a0a0a"/>

  <text x="600" y="35" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="bold">Kitchen Knife Steels — Hardness &amp; Character</text>

  <!-- HRC Scale -->
  <text x="100" y="62" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11" font-weight="600">ROCKWELL HARDNESS (HRC)</text>
  <rect x="100" y="70" width="1000" height="6" rx="3" fill="#1f2937"/>
  <text x="100" y="90" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">52</text>
  <text x="600" y="90" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">58</text>
  <text x="1100" y="90" text-anchor="end" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">66</text>

  <!-- German X50 -->
  <rect x="100" y="70" width="290" height="6" rx="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="245" cy="73" r="5" fill="#f59e0b"/>
  <rect x="60" y="105" width="320" height="55" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <text x="80" y="128" fill="#ffffff" font-family="system-ui, sans-serif" font-size="17" font-weight="600">German X50CrMoV15</text>
  <text x="80" y="148" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="13">54–56 HRC · Soft · Forgiving</text>

  <!-- AUS-8 -->
  <rect x="290" y="70" width="340" height="6" rx="3" fill="#10b981" opacity="0.4"/>
  <circle cx="460" cy="73" r="5" fill="#10b981"/>
  <rect x="250" y="175" width="320" height="55" rx="8" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <text x="270" y="198" fill="#ffffff" font-family="system-ui, sans-serif" font-size="17" font-weight="600">AUS-8</text>
  <text x="270" y="218" fill="#10b981" font-family="system-ui, sans-serif" font-size="13">56–58 HRC · All-rounder · Easy to sharpen</text>

  <!-- VG-10 -->
  <rect x="530" y="70" width="330" height="6" rx="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="695" cy="73" r="5" fill="#3b82f6"/>
  <rect x="490" y="245" width="320" height="55" rx="8" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <text x="510" y="268" fill="#ffffff" font-family="system-ui, sans-serif" font-size="17" font-weight="600">VG-10</text>
  <text x="510" y="288" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="13">60–62 HRC · Keen edge · Holds well</text>

  <!-- SG2/R2 -->
  <rect x="740" y="70" width="360" height="6" rx="3" fill="#ef4444" opacity="0.4"/>
  <circle cx="920" cy="73" r="5" fill="#ef4444"/>
  <rect x="700" y="315" width="440" height="55" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <text x="720" y="338" fill="#ffffff" font-family="system-ui, sans-serif" font-size="17" font-weight="600">SG2 / R2 (Powdered Steel)</text>
  <text x="720" y="358" fill="#ef4444" font-family="system-ui, sans-serif" font-size="13">62–64 HRC · Excellent edge retention · Needs fine belts</text>

  <!-- Bottom labels -->
  <text x="160" y="392" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="12">← EASIER TO SHARPEN</text>
  <text x="1040" y="392" text-anchor="end" fill="#ef4444" font-family="system-ui, sans-serif" font-size="12">HOLDS EDGE LONGER →</text>
</svg>
